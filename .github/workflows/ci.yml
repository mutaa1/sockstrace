---
"on":
  push: {}
  pull_request: {}
jobs:
  golangci-lint:
  runs-on: ubuntu-latest

  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # IMPORTANT for --new-from-rev

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.22"
        cache: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libseccomp-dev \
          pkg-config \
          build-essential

    - name: Prepare modules
      run: |
        go env -w GO111MODULE=on
        go mod download
        go mod tidy
        go generate ./...
        go mod tidy

    # -----------------------------
    # 1. STRICT NEW CODE LINT (FAIL PR)
    # -----------------------------
    - name: golangci-lint (new code strict)
      uses: golangci/golangci-lint-action@v8
      with:
        version: latest
        args: >
          --timeout=5m
          --new-from-rev=origin/main
          --disable=cyclop,dupl,godox,err113,mnd,staticcheck,lll,revive,varnamelen,wrapcheck

    # -----------------------------
    # 2. FULL LINT REPORT (OPTIONAL)
    # -----------------------------
    - name: golangci-lint (full report)
      continue-on-error: true
      run: |
        golangci-lint run \
          --timeout=5m \
          --out-format=json:lint-report.json

    - name: Upload lint report
      uses: actions/upload-artifact@v4
      with:
        name: golangci-lint-report
        path: lint-report.json

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Run ShellCheck
        run: bash testdata/shellcheck.bash

  socks-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            curl \
            netcat-openbsd \
            libseccomp-dev \
            pkg-config \
            build-essential \
            tor
      - name: Prepare modules
        run: |
          go mod tidy
          go mod download
      - name: Build project
        run: go build -o sockstrace .
      - name: Start Tor SOCKS5
        run: |
          tor &
          for i in {1..20}; do
            nc -z 127.0.0.1 9050 && echo "Tor SOCKS ready" && exit 0
            sleep 1
          done
          echo "Tor failed to start"
          exit 1
      - name: Verify SOCKS port
        run: ss -lntp | grep 9050 || true
      - name: WGET SOCKS auth test
        run: |
          ./sockstrace wget \
            --args "https://check.torproject.org" \
            --proxy-user user \
            --proxy-pass pass
      - name: CURL SOCKS auth test
        run: |
          ./sockstrace curl \
            --args "https://check.torproject.org" \
            --proxy-user user \
            --proxy-pass pass
  firefox-webrtc-test:
    runs-on: ubuntu-latest
    env:
      NO_AUTH: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Install dependencies
        run: |
          sudo add-apt-repository -y ppa:mozillateam/ppa
          {
            echo 'Package: *'
            echo 'Pin: release o=LP-PPA-mozillateam'
            echo 'Pin-Priority: 1001'
          } | sudo tee /etc/apt/preferences.d/mozilla-firefox
          sudo apt-get update
          sudo apt-get install -y \
            firefox-esr \
            libseccomp-dev \
            pkg-config \
            build-essential
      - name: Build project
        run: |
          go mod tidy
          go build -o sockstrace .
          cd testdata && go mod tidy
      - name: Start SOCKS5 server
        run: |
          (
            cd testdata
            go run socks5_server.go &
          )
          sleep 3
      - name: Setup Firefox profile
        run: |
          bash testdata/setup_firefox_profile.sh
      - name: Run Firefox WebRTC test
        run: |
          echo "Testing Firefox via SOCKS5 proxy..."
          timeout 60 ./sockstrace firefox \
            --args "https://browserleaks.com/webrtc" \
            --args "-P" \
            --args "proxy-profile" \
            --args "--headless" \
            --logleaks || [ $? -eq 124 ]
