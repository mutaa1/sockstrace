---
name: CI

on:
  push: {}
  pull_request: {}

jobs:
  golangci-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libseccomp-dev \
            pkg-config \
            build-essential

      - name: Prepare modules
        run: |
          go env -w GO111MODULE=on
          go mod download
          go mod tidy
          go generate ./...
          go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: --timeout=5m


  socks-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            curl \
            libseccomp-dev \
            pkg-config \
            build-essential \
            tor

      # ✅ REAL SOCKS5 SERVER (FIXES "Invalid Version")
      - name: Start real SOCKS5 (Tor)
        run: |
          tor &
          sleep 5

      - name: Prepare modules
        run: |
          go env -w GO111MODULE=on
          go mod download
          go mod tidy

      - name: Build project
        run: go build -o sockstrace .

      - name: Run curl test through SOCKS5
        run: |
          ./sockstrace curl \
            --args "https://check.torproject.org"


  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: bash testdata/shellcheck.bash
