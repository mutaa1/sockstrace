---
name: CI

"on":
  push: {}
  pull_request: {}

jobs:
  golangci-lint:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.allow_failure }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Go Lint New
            golangci_args: "--new-from-rev=HEAD~"
            allow_failure: false

          - name: Go Lint Mandatory
            golangci_args: >-
              --disable=cyclop,dupl,godox,err113,mnd,staticcheck,lll,revive,varnamelen,wrapcheck
            allow_failure: false

          - name: Go Lint
            golangci_args: ""
            allow_failure: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libseccomp-dev \
            pkg-config \
            build-essential

      - name: Prepare modules
        run: |
          go env -w GO111MODULE=on
          go mod download
          go mod tidy
          go generate ./...
          go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: >-
            --default=all
            --disable=exhaustruct,gochecknoglobals,gochecknoinits,interfacebloat,gomoddirectives,lll,godot,tagalign,godox,depguard,funlen,gocognit,gosec,nestif,noinlineerr,cyclop,err113,mnd,varnamelen
            ${{ matrix.golangci_args }}
            --timeout=5m
            -v

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: bash testdata/shellcheck.bash

  socks-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            curl \
            netcat-openbsd \
            libseccomp-dev \
            pkg-config \
            build-essential \
            tor

      - name: Prepare modules
        run: |
          go mod tidy
          go mod download

      - name: Build project
        run: |
          go build -o sockstrace .

      - name: Start Tor SOCKS5
        run: |
          tor &
          for i in {1..20}; do
            nc -z 127.0.0.1 9050 && echo "Tor SOCKS ready" && exit 0
            sleep 1
          done
          echo "Tor failed to start"
          exit 1

      - name: Verify SOCKS port
        run: ss -lntp | grep 9050 || true

      - name: WGET SOCKS auth test
        run: |
          ./sockstrace wget \
            --args "https://check.torproject.org" \
            --proxy-user user \
            --proxy-pass pass

      - name: CURL SOCKS auth test
        run: |
          ./sockstrace curl \
            --args "https://check.torproject.org" \
            --proxy-user user \
            --proxy-pass pass

  firefox-webrtc-test:
    runs-on: ubuntu-latest

    container:
      image: golang:1.22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            firefox-esr \
            libseccomp-dev \
            pkg-config \
            build-essential

      - name: Prepare modules
        run: |
          go mod tidy
          go mod download

      - name: Build project
        run: |
          go build -o sockstrace .
          cd testdata
          go mod tidy

      - name: Start SOCKS server
        env:
          NO_AUTH: "1"
        run: |
          cd testdata
          go run socks5_server.go &
          sleep 3

      - name: Setup Firefox profile
        run: |
          bash testdata/setup_firefox_profile.sh

      - name: Run Firefox WebRTC test
        run: |
          timeout 60 ./sockstrace firefox \
            --args "https://browserleaks.com/webrtc" \
            --args "-P" \
            --args "proxy-profile" \
            --args "--headless" \
            --logleaks || [ $? -eq 124 ]
