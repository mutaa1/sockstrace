name: CI

on:
  push:
  pull_request:

jobs:
  golangci-lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libseccomp-dev \
            pkg-config \
            build-essential

      - name: Prepare modules
        run: |
          go mod tidy
          go generate ./...
          go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: >
            --default=all
            --disable=exhaustruct,gochecknoglobals,gochecknoinits,interfacebloat,gomoddirectives,lll,godot,tagalign,godox,depguard,funlen,gocognit,gosec,nestif,noinlineerr,cyclop,err113,mnd,varnamelen
            -v
            --timeout=5m

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: bash testdata/shellcheck.bash

  socks-tests:
    name: Socksification Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            curl \
            libseccomp-dev \
            pkg-config \
            build-essential

      - name: Build project
        run: |
          go mod tidy
          go build -o sockstrace .
          (
            cd testdata
            go mod tidy
          )

      - name: Start SOCKS5 server
        run: |
          (
            cd testdata
            go run socks5_server.go &
          )
          sleep 3

      - name: Test wget socksification
        run: |
          echo "Testing wget socksification..."
          ./sockstrace wget \
            --args "https://check.torproject.org" \
            --proxy-user user \
            --proxy-pass pass

      - name: Test curl socksification
        run: |
          echo "Testing curl socksification..."
          ./sockstrace curl \
            --args "https://check.torproject.org" \
            --proxy-user user \
            --proxy-pass pass

  firefox-webrtc-test:
    name: WebRTC Firefox Test
    runs-on: ubuntu-latest

    env:
      NO_AUTH: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            firefox \
            libseccomp-dev \
            pkg-config \
            build-essential

      - name: Build project
        run: |
          go mod tidy
          go build -o sockstrace .
          (
            cd testdata
            go mod tidy
          )

      - name: Start SOCKS5 server
        run: |
          (
            cd testdata
            go run socks5_server.go &
          )
          sleep 3

      - name: Setup Firefox profile
        run: |
          bash testdata/setup_firefox_profile.sh

      - name: Test Firefox via SOCKS5 proxy
        run: |
          echo "Testing Firefox via SOCKS5 proxy..."
          timeout 60 ./sockstrace firefox \
            --args "https://browserleaks.com/webrtc" \
            --args "-P" \
            --args "proxy-profile" \
            --args "--headless" \
            --logleaks || [ $? -eq 124 ]
